name: CI

on:
  push:
    branches:
      - main
      - "codex/**"
  pull_request:

jobs:
  api_nlp_tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install -r services/nlp/requirements.txt

      - name: Run API tests
        run: pytest -q apps/api/tests

      - name: Run NLP tests
        run: pytest -q services/nlp/tests

  web_typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Typecheck web
        run: npm run typecheck:web
